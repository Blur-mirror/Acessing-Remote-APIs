<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Antonio Cruel - 75203</title>
  </head>
  <body>
    <h1>Global Data Explorer</h1>

    <div id="button-container">
      <button class="btn" id="btn-countries">Load Countries</button>
      <button class="btn" id="btn-users">Load Users</button>
      <button class="btn" id="btn-pokemon">Load Pokémon</button>
    </div>

    <section id="filter-countries" class="filter-section">
      <div class="form-group">
        <label>Search by Name:</label>
        <input type="text" id="countrySearch" placeholder="e.g. Ireland" />
      </div>
      <div class="form-group">
        <label>Filter by Continent:</label>
        <select id="regionSelect">
          <option value="all">All Continents</option>
          <option value="africa">Africa</option>
          <option value="americas">Americas</option>
          <option value="asia">Asia</option>
          <option value="europe">Europe</option>
          <option value="oceania">Oceania</option>
        </select>
      </div>
    </section>

    <section id="filter-pokemon" class="filter-section">
      <div class="form-group">
        <label>Search Pokedex (Exact Name):</label>
        <input type="text" id="pokemonSearch" placeholder="e.g. pikachu" />
      </div>
    </section>

    <div id="remote-data-container"></div>

    <script>
      // Global state to store fetched data for local filtering
      let allCountries = [];
      const container = document.getElementById("remote-data-container");

      // --- API 1: Countries (Using Async/Await) ---
      async function fetchCountries() {
        container.innerHTML = "<p>Loading Countries...</p>";
        try {
          const response = await fetch(
            "https://restcountries.com/v3.1/all?fields=name,flags,region,population",
          );
          if (!response.ok) throw new Error("Failed to fetch countries");

          const data = await response.json();
          // Sort alphabetically by common name
          allCountries = data.sort((a, b) =>
            a.name.common.localeCompare(b.name.common),
          );
          displayCountries(allCountries);
        } catch (err) {
          showError(err.message);
        }
      }

      function displayCountries(arr) {
        container.innerHTML = arr
          .map(
            (c) => `
                <div class="card">
                    <img src="${c.flags.png}" alt="Flag">
                    <h3>${c.name.common}</h3>
                    <p>Region: ${c.region}</p>
                    <p>Population: ${c.population.toLocaleString()}</p>
                </div>
            `,
          )
          .join("");
      }

      // --- API 2: Users (JSONPlaceholder) ---
      async function fetchUsers() {
        container.innerHTML = "<p>Loading Users...</p>";
        try {
          const response = await fetch(
            "https://jsonplaceholder.typicode.com/users",
          );
          if (!response.ok) throw new Error("Failed to fetch users");
          const users = await response.json();

          container.innerHTML = users
            .map(
              (u) => `
                    <div class="card">
                        <h3>${u.name}</h3>
                        <p><strong>Username:</strong> ${u.username}</p>
                        <p><strong>Email:</strong> ${u.email}</p>
                        <p><strong>Company:</strong> ${u.company.name}</p>
                    </div>
                `,
            )
            .join("");
        } catch (err) {
          showError(err.message);
        }
      }

      // --- API 3: Pokémon ---
      async function fetchPokemon(name = "") {
        try {
          const url = name
            ? `https://pokeapi.co/api/v2/pokemon/${name.toLowerCase().trim()}`
            : `https://pokeapi.co/api/v2/pokemon?limit=20`;

          const response = await fetch(url);
          if (!response.ok) {
            container.innerHTML = `<p class="error">No Pokémon found named "${name}"</p>`;
            return;
          }
          const data = await response.json();

          if (name) {
            // Single Pokémon result
            displaySinglePokemon(data);
          } else {
            // List of Pokémon
            container.innerHTML = "";
            data.results.forEach((p) => {
              const id = p.url.split("/").filter(Boolean).pop();
              renderPokemonCard(id, p.name);
            });
          }
        } catch (err) {
          showError("Pokémon API error");
        }
      }

      function renderPokemonCard(id, name) {
        const imgUrl = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${id}.png`;
        container.innerHTML += `
                <div class="card">
                    <img src="${imgUrl}" alt="${name}">
                    <h3 style="text-transform: capitalize;">${name}</h3>
                    <p>ID: #${id}</p>
                </div>
            `;
      }

      function displaySinglePokemon(p) {
        container.innerHTML = "";
        renderPokemonCard(p.id, p.name);
      }

      // --- Helper: Error Display ---
      function showError(msg) {
        container.innerHTML = `<p class="error">⚠️ Error: ${msg}</p>`;
      }

      // --- Event Listeners & Logic ---
      document.addEventListener("DOMContentLoaded", () => {
        const countryFilterSection =
          document.getElementById("filter-countries");
        const pokemonFilterSection = document.getElementById("filter-pokemon");

        // Main Button Navigation
        document
          .getElementById("button-container")
          .addEventListener("click", (e) => {
            if (!e.target.classList.contains("btn")) return;

            // Reset UI
            container.innerHTML = "";
            countryFilterSection.style.display = "none";
            pokemonFilterSection.style.display = "none";

            if (e.target.id === "btn-countries") {
              countryFilterSection.style.display = "block";
              fetchCountries();
            } else if (e.target.id === "btn-users") {
              fetchUsers();
            } else if (e.target.id === "btn-pokemon") {
              pokemonFilterSection.style.display = "block";
              fetchPokemon();
            }
          });

        // Country Search/Filter Logic
        const filterCountriesAction = () => {
          const search = document
            .getElementById("countrySearch")
            .value.toLowerCase();
          const region = document
            .getElementById("regionSelect")
            .value.toLowerCase();

          const filtered = allCountries.filter((c) => {
            const matchesName = c.name.common.toLowerCase().includes(search);
            const matchesRegion =
              region === "all" || c.region.toLowerCase() === region;
            return matchesName && matchesRegion;
          });
          displayCountries(filtered);
        };

        document
          .getElementById("countrySearch")
          .addEventListener("input", filterCountriesAction);
        document
          .getElementById("regionSelect")
          .addEventListener("change", filterCountriesAction);

        // Pokemon Search Logic
        document
          .getElementById("pokemonSearch")
          .addEventListener("input", (e) => {
            const val = e.target.value.trim();
            if (val.length > 2) fetchPokemon(val);
            else if (val === "") fetchPokemon();
          });
      });
    </script>
  </body>
</html>
